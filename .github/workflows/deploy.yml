name: Deploy Quartz site to GitHub Pages
 
on:
  push:
    branches:
      - v4
 
permissions:
  contents: read
  pages: write
  id-token: write
 
concurrency:
  group: "pages"
  cancel-in-progress: false


env:
  FILE: './content/example.py'  # Source file where scenes are defined
  MANIM: 'manim'  # manim or manimgl - which Manim renderer to use
  SCENES: 'ThreeDExample'  # Space-separated list of scenes to render
  USES_TEX: true  # true or false - disabling this will make the action run faster
  DISPLAY: :99  # Do not touch this
 
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for git info
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Dependencies
        run: npm ci
      - name: Build Quartz
        run: npx quartz build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
 
  deploy:
    needs: build
    permissions: write-all
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: pip

      - name: Install manim dependencies on Ubuntu
        if: ${{ env.MANIM == 'manim' }}
        run: |
          sudo apt-get update
          sudo apt-get install libcairo2-dev libpango1.0-dev ffmpeg freeglut3-dev

      - name: Install manimgl dependencies on Ubuntu
        if: ${{ env.MANIM == 'manimgl' }}
        run: |
          sudo apt-get update
          sudo apt-get install libpango1.0-dev ffmpeg freeglut3-dev xvfb
          nohup Xvfb $DISPLAY &

      - name: Setup TeX Live
        if: ${{ env.USES_TEX == 'true' }}
        uses: teatimeguest/setup-texlive-action@v3
        with:
          packages: >-
            amsmath
            babel-english
            cbfonts-fd
            cm-super
            count1to
            ctex
            doublestroke
            dvisvgm
            everysel
            fontspec
            frcursive
            fundus-calligra
            gnu-freefont
            jknapltx
            latex-bin
            mathastext
            microtype
            multitoc
            physics
            prelim2e
            preview
            ragged2e
            relsize
            rsfs
            setspace
            standalone
            tipa
            wasy
            wasysym
            xcolor
            xetex
            xkeyval

      - name: Install Python dependencies
        run: pip install -r ./content/requirements.txt

      - name: Build HTML
        run: |
          ${{ env.MANIM }} ${{ env.FILE }} ${{ env.SCENES }}
          manim-slides convert ${{ env.SCENES }} _site/index.html

      # - name: Push to gh-pages branch
      #   if: github.event_name != 'pull_request'
