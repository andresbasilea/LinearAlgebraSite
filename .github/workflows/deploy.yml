name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - v4

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false


env:
  FILE: './content/example.py'  # Source file where scenes are defined
  MANIM: 'manim'  # manim or manimgl - which Manim renderer to use
  SCENES: 'ThreeDExample'  # Space-separated list of scenes to render
  USES_TEX: true  # true or false - disabling this will make the action run faster
  DISPLAY: :99  # Do not touch this

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for git info

      # --- Quartz Setup & Build ---
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Quartz Dependencies
        run: npm ci
      - name: Build Quartz
        run: npx quartz build

      # --- Manim Setup & Build (MOVED HERE) ---
      # This entire section was previously in your 'deploy' job.
      # It must run *before* the 'Upload artifact' step so Manim's output is included.
      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: pip

      - name: Install manim dependencies on Ubuntu
        if: ${{ env.MANIM == 'manim' }}
        run: |
          sudo apt-get update
          sudo apt-get install libcairo2-dev libpango1.0-dev ffmpeg freeglut3-dev

      - name: Install manimgl dependencies on Ubuntu
        if: ${{ env.MANIM == 'manimgl' }}
        run: |
          sudo apt-get update
          sudo apt-get install libpango1.0-dev ffmpeg freeglut3-dev xvfb
          nohup Xvfb $DISPLAY &

      - name: Setup TeX Live
        if: ${{ env.USES_TEX == 'true' }}
        uses: teatimeguest/setup-texlive-action@v3
        with:
          packages: >-
            amsmath
            babel-english
            cbfonts-fd
            cm-super
            count1to
            ctex
            doublestroke
            dvisvgm
            everysel
            fontspec
            frcursive
            fundus-calligra
            gnu-freefont
            jknapltx
            latex-bin
            mathastext
            microtype
            multitoc
            physics
            prelim2e
            preview
            ragged2e
            relsize
            rsfs
            setspace
            standalone
            tipa
            wasy
            wasysym
            xcolor
            xetex
            xkeyval

      - name: Install Python dependencies
        run: pip install -r ./content/requirements.txt

      - name: Build Manim Slides HTML
        # IMPORTANT: Output the Manim Slides HTML directly into the Quartz 'public' directory
        # This makes it part of the artifact that gets uploaded to GitHub Pages.
        # You need to decide the exact path within 'public'.
        # For example, to put it in 'public/my_manim_slides.html' (if it's your main slides)
        # OR 'public/presentations/my_manim_slides.html' if you want it in a subfolder.
        run: |
          # Create the target directory if it doesn't exist
          mkdir -p public/manim-slides
          manim-slides convert --one-file "${{ env.FILE }}" "${{ env.SCENES }}" public/manim-slides/index.html
          # I've chosen 'public/manim-slides/index.html' as an example.
          # This means you'll link to it as '/manim-slides/' or '/manim-slides/index.html' on your site.
          # If you want to use the scene name:
          # manim-slides convert --one-file ${{ env.SCENES }} public/manim-slides/${{ env.SCENES }}.html
          # Then link to it as '/manim-slides/ThreeDExample.html'
      # --- END Manim Setup & Build ---

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public # This is crucial. It uploads everything in 'public', including your Manim Slides.

  deploy:
    needs: build
    permissions: write-all
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Removed: The Manim-related steps were here previously and caused the problem.
      # You do NOT need to checkout again or install Manim/Python here, as the artifact is already built.