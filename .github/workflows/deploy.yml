name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - v4

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false


env:
  FILE: './content/example.py'  # Source file where scenes are defined
  MANIM: 'manim'  # manim or manimgl - which Manim renderer to use
  SCENES: 'ThreeDExample'  # Space-separated list of scenes to render
  USES_TEX: true  # true or false - disabling this will make the action run faster
  DISPLAY: :99  # Do not touch this
  # Define a temporary output directory for Manim videos
  MANIM_VIDEO_OUTPUT_DIR: 'temp_manim_renders' 

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for git info

      # --- Quartz Setup & Build ---
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Quartz Dependencies
        run: npm ci
      - name: Build Quartz
        run: npx quartz build

      # --- Manim Setup & Render (MOVED HERE AND MODIFIED) ---
      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: pip

      - name: Install manim dependencies on Ubuntu
        if: ${{ env.MANIM == 'manim' }}
        run: |
          sudo apt-get update
          sudo apt-get install libcairo2-dev libpango1.0-dev ffmpeg freeglut3-dev

      - name: Install manimgl dependencies on Ubuntu
        if: ${{ env.MANIM == 'manimgl' }}
        run: |
          sudo apt-get update
          sudo apt-get install libpango1.0-dev ffmpeg freeglut3-dev xvfb
          nohup Xvfb $DISPLAY &

      - name: Setup TeX Live
        if: ${{ env.USES_TEX == 'true' }}
        uses: teatimeguest/setup-texlive-action@v3
        with:
          packages: >-
            amsmath
            babel-english
            cbfonts-fd
            cm-super
            count1to
            ctex
            doublestroke
            dvisvgm
            everysel
            fontspec
            frcursive
            fundus-calligra
            gnu-freefont
            jknapltx
            latex-bin
            mathastext
            microtype
            multitoc
            physics
            prelim2e
            preview
            ragged2e
            relsize
            rsfs
            setspace
            standalone
            tipa
            wasy
            wasysym
            xcolor
            xetex
            xkeyval

      - name: Install Python dependencies
        run: pip install -r ./content/requirements.txt

      - name: Render Manim Video(s)
        # Use manim to render the scene(s) to a controlled output directory
        # -ql for low quality, faster render for GitHub Actions; you can adjust if needed
        # --output_directory specifies where Manim puts its 'media' folder
        run: ${{ env.MANIM }} -ql --output_directory ${{ env.MANIM_VIDEO_OUTPUT_DIR }} ${{ env.FILE }} ${{ env.SCENES }}

      - name: Build Manim Slides HTML
        run: |
          # Create the final target directory inside Quartz's 'public' output folder
          mkdir -p public/manim-slides
          
          # Construct the exact path to the rendered scene's folder within MANIM_VIDEO_OUTPUT_DIR
          # Manim's default output structure is typically:
          # <output_directory>/videos/<Python_file_name_without_extension>/<SceneName>/<resolution>/
          # For example: temp_manim_renders/videos/example_py/ThreeDExample/1080p/
          
          # This variable will hold the path to the folder Manim Slides expects.
          # Adjust if your Manim version/config has a different default output structure
          RENDERED_SCENE_PATH="${{ env.MANIM_VIDEO_OUTPUT_DIR }}/videos/$(basename ${{ env.FILE }} .py)/${{ env.SCENES }}"
          
          echo "Attempting to convert from Manim's output folder: $RENDERED_SCENE_PATH"
          
          # Now, tell manim-slides to convert from this *folder*
          manim-slides convert --one-file "$RENDERED_SCENE_PATH" public/manim-slides/index.html
          
          # Optional: List contents to debug if the path is still incorrect
          echo "Contents of $RENDERED_SCENE_PATH:"
          ls -F "$RENDERED_SCENE_PATH" || true # `|| true` prevents step from failing if dir is empty/non-existent for ls
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public # This is crucial. It uploads everything in 'public', including your Manim Slides.

  deploy:
    needs: build
    permissions: write-all
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Removed: Manim-related steps are now in the 'build' job