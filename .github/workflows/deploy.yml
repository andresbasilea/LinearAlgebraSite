name: Deploy Quartz site to GitHub Pages
 
on:
  push:
    branches:
      - v4
 
permissions:
  contents: read
  pages: write
  id-token: write
 
concurrency:
  group: "pages"
  cancel-in-progress: false
 
# No need for Manim-specific environment variables if generating locally
# env:
#   FILE: './content/example.py'
#   MANIM: 'manim'
#   SCENES: 'ThreeDExample'
#   USES_TEX: true
#   DISPLAY: :99
 
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for git info
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install Dependencies
        run: npm ci
      - name: Build Quartz # This will copy your pre-generated Manim HTML from 'content' to 'public'
        run: npx quartz build
      - name: Add .html extensions if missing
        run: |
          # This example assumes files like 'public/threed_example'
          # If they are in subdirectories, adjust the 'find' command path.
          find public/ -type f -name "threed_example" -exec mv {} {}.html \;
          find public/ -type f -name "threed_example_360" -exec mv {} {}.html \;
          find public/ -type f -name "threed_example_background" -exec mv {} {}.html \;
          find public/ -type f -name "convert_example_light" -exec mv {} {}.html \;
          find public/ -type f -name "simple_linear_trasnformation1" -exec mv {} {}.html \;
          find public/ -type f -name "how_think_vectors" -exec mv {} {}.html \;
          find public/ -type f -name "intro" -exec mv {} {}.html \;
          find public/ -type f -name "no_lineal" -exec mv {} {}.html \;
          find public/ -type f -name "cizalla" -exec mv {} {}.html \;
          find public/ -type f -name "rotacion" -exec mv {} {}.html \;
          find public/ -type f -name "rotacion3D" -exec mv {} {}.html \;
          find public/ -type f -name "rotacion3Dbasica" -exec mv {} {}.html \;
          
          find public/ -type f -name "span2d" -exec mv {} {}.html \;
          find public/ -type f -name "span3d" -exec mv {} {}.html \;
          find public/ -type f -name "span3d2" -exec mv {} {}.html \;
          find public/ -type f -name "determinante_js" -exec mv {} {}.html \;
          find public/ -type f -name "transformacion_js" -exec mv {} {}.html \;
          find public/ -type f -name "2DVector" -exec mv {} {}.html \;
          find public/ -type f -name "2DFunctionsSum" -exec mv {} {}.html \;
          find public/ -type f -name "2DScalarMult" -exec mv {} {}.html \;
          find public/ -type f -name "Subspaces" -exec mv {} {}.html \;
          find public/ -type f -name "linearCombination" -exec mv {} {}.mov \;
          find public/ -type f -name "linearCombination" -exec mv {} {}.mp4 \;
          find public/ -type f -name "linearCombination" -exec mv {} {} \;
          find public/ -type f -name "BasisCoordinates" -exec mv {} {}.html \;










          # Add more if other files are affected
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public # This path contains your entire Quartz site + your Manim HTML
 
  deploy:
    needs: build
    permissions: write-all
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      # No need for checkout, Python, Manim, or TeX installations here either